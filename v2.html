<!DOCTYPE html>
<html lang="de">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>CD Timer HUD</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

    <style>
      body {
        margin: 0;
        background: #0b0b0b;
        color: #fff;
        font-family: Arial, sans-serif;
        padding-bottom: 20px;
      }

      /* Aufgeräumte Topbar */
      .topbar {
        display: flex;
        justify-content: space-between;
        padding: 15px;
        background: #111;
        border-bottom: 1px solid #222;
        align-items: center;
      }

      .topbar-brand strong {
        font-size: 16px;
        letter-spacing: 1px;
      }

      input,
      button {
        padding: 10px;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #fff;
        border-radius: 6px;
        box-sizing: border-box;
      }

      input:focus {
        border-color: #00ff88;
        outline: none;
      }

      button {
        cursor: pointer;
        background: #222;
        font-weight: bold;
        transition: background 0.2s;
      }

      button:hover {
        background: #333;
        border-color: #555;
      }

      .container {
        max-width: 1100px;
        margin: auto;
        padding: 12px;
        box-sizing: border-box;
      }

      .hidden {
        display: none !important;
      }

      /* Neuer zentraler Login- & Raum-Auswahl-Bereich */
      .lobby-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        margin-top: 30px;
        width: 100%;
      }

      .setup-box {
        background: #111;
        border: 1px solid #222;
        padding: 20px;
        border-radius: 10px;
        width: 100%;
        max-width: 450px;
        box-sizing: border-box;
      }

      .setup-box h3 {
        margin-top: 0;
        margin-bottom: 15px;
        border-bottom: 1px solid #222;
        padding-bottom: 8px;
        color: #00ff88;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 15px;
      }

      .input-row {
        display: flex;
        gap: 8px;
      }

      .input-row input {
        flex: 1;
      }

      /* Haupt-Layout (Timer & Chat) */
      .main {
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin-top: 15px;
      }

      @media (min-width: 768px) {
        .main {
          flex-direction: row;
        }
      }

      .settings {
        display: none;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        margin: 15px 0;
        padding: 12px;
        background: #111;
        border: 1px solid #222;
        border-radius: 8px;
      }

      .settings.active {
        display: flex;
      }

      .timers {
        flex: 2;
        width: 100%;
      }

      .usersPanel {
        flex: 1;
        width: 100%;
        background: #111;
        border: 1px solid #333;
        border-radius: 10px;
        padding: 12px;
        display: none;
        flex-direction: column;
        box-sizing: border-box;
        height: 530px;
      }

      .usersPanel.active {
        display: flex;
      }

      #userList {
        flex: 1;
        overflow-y: auto;
        min-height: 60px;
        max-height: 120px;
        background: #0b0b0b;
        border: 1px solid #222;
        padding: 6px;
        border-radius: 6px;
        margin-top: 5px;
      }

      .chatBox {
        flex: 2;
        display: flex;
        flex-direction: column;
        border-top: 1px solid #222;
        margin-top: 12px;
        padding-top: 12px;
        overflow: hidden;
      }

      #chatBox {
        flex: 1;
        overflow-y: auto;
        background: #0b0b0b;
        border: 1px solid #333;
        padding: 8px;
        border-radius: 6px;
      }

      .chatInputRow {
        display: flex;
        gap: 5px;
        margin-top: 8px;
      }

      .chatInputRow input {
        flex: 1;
      }

      .chatInputRow button {
        width: 80px;
      }

      /* HUD Cards */
      .hud-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 14px;
        margin-bottom: 10px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        align-items: center;
        text-align: center;
      }

      @media (min-width: 480px) {
        .hud-card {
          grid-template-columns: 60px 1fr 140px;
          text-align: left;
        }
        .center { justify-content: center; }
        .right { justify-content: flex-end; }
      }

      .center {
        display: flex;
        gap: 8px;
        justify-content: center;
      }

      .right {
        display: flex;
        gap: 10px;
        justify-content: center;
        align-items: center;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .green { background: #00ff88; }
      .red { background: #ff4040; }
      .orange { background: #ff9f1a; }

      .orangeWarn {
        border: 2px solid #ff9f1a !important;
        animation: blink .6s infinite;
      }

      .greenWarn {
        border: 2px solid #00ff88 !important;
        animation: greenBlink .6s infinite;
      }

      @keyframes blink { 50% { opacity: .4 } }
      @keyframes greenBlink { 50% { opacity: .4 } }

      #toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #111;
        border: 1px solid #333;
        padding: 14px 20px;
        border-radius: 10px;
        font-size: 14px;
        display: none;
        z-index: 9999;
        text-align: center;
        width: 80%;
        max-width: 300px;
      }

      .room-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        margin-bottom: 8px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        gap: 10px;
      }
    </style>
  </head>

  <body>

    <div class="topbar">
      <div class="topbar-brand">
        <strong>CD TIMER HUD</strong>
      </div>
      <div>
        <span id="roomLabel" style="color: #aaa; font-size: 14px;">Nicht verbunden</span>
      </div>
      <div id="leaveBox" class="hidden">
        <button onclick="leaveRoom()" style="background:#ff4040;border-color:#ff4040;">
          Leave Channel
        </button>
      </div>
    </div>

    <div class="container">

      <div id="lobbyContainer" class="lobby-wrapper">
        
        <div class="setup-box" id="stepUsernameBox">
          <h3>1. Profil</h3>
          <div class="input-group">
            <label for="username" style="font-size: 13px; color: #888;">Dein Spielername:</label>
            <input id="username" placeholder="z.B. SuraGott" oninput="toggleLobbyFields()">
          </div>
        </div>

        <div class="setup-box" id="stepRoomsBox" style="opacity: 0.4; pointer-events: none; transition: opacity 0.3s;">
          <h3>2. Channel wählen</h3>
          
          <div class="input-group">
            <label style="font-size: 13px; color: #888;">Eigenen Channel erstellen oder suchen:</label>
            <div class="input-row">
              <input id="roomInput" placeholder="Channel Name...">
              <button onclick="joinRoom()">Join</button>
              <button onclick="createRoom()" style="background: #00ff88; color: #000; border-color: #00ff88;">Create</button>
            </div>
          </div>

          <div style="margin-top: 20px;">
            <strong style="font-size: 14px; display: block; margin-bottom: 10px;">Verfügbare Räume:</strong>
            <div id="roomList"></div>
          </div>
        </div>

      </div>

      <div class="settings" id="settings">
        <label>Minuten:</label>
        <input id="minutesInput" value="18" style="width: 60px; text-align: center;">

        <label style="display:flex;align-items:center;gap:6px;cursor: pointer; margin-left: 15px;">
          <input type="checkbox" id="muteVoice">
          Mute Voice
        </label>
      </div>

      <div class="main">

        <div class="timers">
          <div id="list" class="hidden"></div>
        </div>

        <div class="usersPanel" id="usersBox">
          <strong>Online Users</strong>
          <div id="userList"></div>

          <div class="chatBox">
            <strong>Chat</strong>
            <div id="chatBox"></div>

            <div class="chatInputRow">
              <input id="chatInput" placeholder="Nachricht...">
              <button onclick="sendChat()" style="background: #00ff88; color: #000; border-color: #00ff88;">Send</button>
            </div>
          </div>
        </div>

      </div>

    </div>

    <div id="toast"></div>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCx52T35a9Jvsrbl51abjdN0hsSxo7z27M",
        authDomain: "metin-cdtimer.firebaseapp.com",
        databaseURL: "https://metin-cdtimer-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "metin-cdtimer",
        storageBucket: "metin-cdtimer.firebasestorage.app",
        messagingSenderId: "76292108896",
        appId: "1:76292108896:web:6030d1d5c7ccfea7d44905",
        measurementId: "G-85TB0NSB8X"
      };
      
      firebase.initializeApp(firebaseConfig);
      firebase.auth().signInAnonymously().then(() => {
        initFixedRooms();
        loadRooms();
        updateUI();
      });
      
      const db = firebase.database();
      let ROOM = null;
      let timersData = {};
      let lastRemaining = {};
      let roomRef = null;
      let chatRef = null;
      let usersRef = null;

      const FIXED_ROOMS = [
        "Orctal Schatten 1",
        "Orctal Schatten 2",
        "Orctal Seele 1",
        "Orctal Seele 2"
      ];

      // Schaltet die Raum-Sektion frei, sobald ein Username eingetippt wurde
      function toggleLobbyFields() {
        const username = document.getElementById("username").value.trim();
        const roomsBox = document.getElementById("stepRoomsBox");
        if (username.length > 0) {
          roomsBox.style.opacity = "1";
          roomsBox.style.pointerEvents = "auto";
        } else {
          roomsBox.style.opacity = "0.4";
          roomsBox.style.pointerEvents = "none";
        }
      }

      function initFixedRooms() {
        FIXED_ROOMS.forEach(room => {
          db.ref(`rooms/${room}/isFixed`).set(true);
        });
      }

      function updateUI() {
        const inRoom = !!ROOM;
        document.getElementById("leaveBox").classList.toggle("hidden", !inRoom);
        document.getElementById("lobbyContainer").classList.toggle("hidden", inRoom);
        
        if (inRoom) {
          document.getElementById("roomLabel").innerHTML = `Aktiv: <span style="color: #00ff88; font-weight:bold;">${ROOM}</span>`;
        } else {
          document.getElementById("roomLabel").innerText = "Nicht verbunden";
          toggleLobbyFields();
        }
      }

      function speak(text) {
        if (document.getElementById("muteVoice").checked) return;
        if (speechSynthesis.speaking) {
          speechSynthesis.cancel();
        }
        setTimeout(() => {
          const msg = new SpeechSynthesisUtterance(text);
          msg.lang = "de-DE";
          msg.rate = 1;
          msg.volume = 1;
          const voices = speechSynthesis.getVoices();
          if (voices.length) {
            msg.voice = voices.find(v => v.lang.includes("de")) || voices[0];
          }
          speechSynthesis.speak(msg);
        }, 50);
      }

      function showMessage(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.style.display = "block";
        setTimeout(() => t.style.display = "none", 2500);
      }

      function setRoom(r) {
        ROOM = r;
        document.getElementById("list").classList.remove("hidden");
        document.getElementById("settings").classList.add("active");
        document.getElementById("usersBox").classList.add("active");
        updateUI();
        listenRoom();
        listenChat();
        listenUsers();
        registerUser();
      }

      function leaveRoom() {
        if (ROOM) {
          const myUid = firebase.auth().currentUser.uid;
          
          if (!FIXED_ROOMS.includes(ROOM)) {
            db.ref(`rooms/${ROOM}/users`).once("value", snap => {
              const users = snap.val() || {};
              const uids = Object.keys(users);
              
              if (uids.length <= 1 && uids.includes(myUid)) {
                db.ref(`rooms/${ROOM}`).remove();
              } else {
                db.ref(`rooms/${ROOM}/users/${myUid}`).remove();
              }
            });
          } else {
            db.ref(`rooms/${ROOM}/users/${myUid}`).remove();
          }

          db.ref(`rooms/${ROOM}/users/${myUid}`).onDisconnect().cancel();
          db.ref(`rooms/${ROOM}`).onDisconnect().cancel();
        }

        if (roomRef) roomRef.off();
        if (chatRef) chatRef.off();
        if (usersRef) usersRef.off();
        roomRef = null;
        chatRef = null;
        usersRef = null;
        speechSynthesis.cancel();
        ROOM = null;
        timersData = {};
        lastRemaining = {};
        document.getElementById("list").classList.add("hidden");
        document.getElementById("settings").classList.remove("active");
        document.getElementById("usersBox").classList.remove("active");
        document.getElementById("userList").innerHTML = "";
        document.getElementById("chatBox").innerHTML = "";
        updateUI();
      }

      function requireUsername() {
        const u = document.getElementById("username").value.trim();
        if (!u) {
          showMessage("⚠ Bitte Username eingeben");
          return null;
        }
        return u;
      }

      function loadRooms() {
        db.ref("rooms").on("value", snap => {
          const fbRooms = snap.val() || {};
          const list = document.getElementById("roomList");
          const activeRoomNames = Object.keys(fbRooms);
          
          let roomsHTML = FIXED_ROOMS.map(room => {
            const users = fbRooms[room]?.users || {};
            const count = Object.keys(users).length;
            return createRoomRowHTML(room, count, true);
          });

          activeRoomNames.forEach(room => {
            if (!FIXED_ROOMS.includes(room)) {
              const users = fbRooms[room]?.users || {};
              const count = Object.keys(users).length;
              if (count > 0) {
                roomsHTML.push(createRoomRowHTML(room, count, false));
              }
            }
          });

          list.innerHTML = roomsHTML.join("");
        });
      }

      function createRoomRowHTML(name, userCount, isFixed) {
        const icon = isFixed ? "⭐" : "🕒";
        const label = isFixed ? "Fester Raum" : "Temporär";
        return `
<div class="room-item">
  <div style="min-width: 0; flex: 1;">
    <strong style="word-break: break-all; font-size:14px;">${icon} ${name}</strong>
    <div style="font-size:11px;color:#aaa;margin-top:2px;">👥 ${userCount} online • <span style="color:#666">${label}</span></div>
  </div>
  <button onclick="quickJoin('${name}')" style="padding:5px 12px; font-size:12px;">Join</button>
</div>`;
      }

      function quickJoin(room) {
        const u = requireUsername();
        if (!u) return;
        setRoom(room);
        showMessage("Connected: " + room);
      }

      function joinRoom() {
        const room = document.getElementById("roomInput").value.trim();
        if (!room) return showMessage("⚠ Room Name fehlt");
        const user = requireUsername();
        if (!user) return;
        
        if (FIXED_ROOMS.includes(room)) {
          setRoom(room);
          showMessage("🔵 Verbunden mit Channel");
        } else {
          db.ref(`rooms/${room}`).once("value", snap => {
            const hasUsers = snap.child("users").exists();
            if (!snap.exists() || !hasUsers) {
              showMessage("❌ Channel existiert nicht oder ist inaktiv");
              return;
            }
            setRoom(room);
            showMessage("🔵 Verbunden mit Channel");
          });
        }
      }

      function createRoom() {
        const room = document.getElementById("roomInput").value.trim();
        if (!room) return showMessage("⚠ Room Name fehlt");
        const user = requireUsername();
        if (!user) return;
        
        if (FIXED_ROOMS.includes(room)) {
          setRoom(room);
          showMessage("⚠ Das ist ein fester Channel – verbunden");
          return;
        }

        db.ref(`rooms/${room}`).once("value", snap => {
          const hasUsers = snap.child("users").exists();
          if (snap.exists() && hasUsers) {
            setRoom(room);
            showMessage("⚠ Channel existiert bereits – verbunden");
            return;
          }
          
          setRoom(room);
          showMessage("✅ Temporärer Channel erstellt");
        });
      }

      function registerUser() {
        const uid = firebase.auth().currentUser.uid;
        const name = document.getElementById("username").value.trim() || "User";
        
        const myUserRef = db.ref(`rooms/${ROOM}/users/${uid}`);
        myUserRef.set(name);
        
        if (!FIXED_ROOMS.includes(ROOM)) {
          db.ref(`rooms/${ROOM}/users`).once("value", snap => {
            const users = snap.val() || {};
            if (Object.keys(users).length <= 1) {
              db.ref(`rooms/${ROOM}`).onDisconnect().remove();
            } else {
              myUserRef.onDisconnect().remove();
              db.ref(`rooms/${ROOM}`).onDisconnect().cancel();
            }
          });
        } else {
          myUserRef.onDisconnect().remove();
        }
      }

      function listenUsers() {
        if (usersRef) usersRef.off();
        usersRef = db.ref(`rooms/${ROOM}/users`);
        usersRef.on("value", snap => {
          const data = snap.val() || {};
          document.getElementById("userList").innerHTML =
            Object.values(data).map(u => `<div style="padding:2px 0; font-size:13px;">🟩 ${u}</div>`).join("");
        });
      }

      function sendChat() {
        const input = document.getElementById("chatInput");
        const text = input.value.trim();
        if (!text) return;
        
        const chatRef = db.ref(`rooms/${ROOM}/chat`);
        
        chatRef.push({
          user: document.getElementById("username").value.trim() || "User",
          text,
          timestamp: Date.now()
        });
        
        input.value = "";

        chatRef.once("value", snap => {
          if (snap.exists()) {
            const data = snap.val();
            const keys = Object.keys(data);
            if (keys.length > 10) {
              const sortedKeys = keys.sort((a, b) => data[a].timestamp - data[b].timestamp);
              const einträgeZumLöschen = sortedKeys.length - 10;
              for (let i = 0; i < einträgeZumLöschen; i++) {
                chatRef.child(sortedKeys[i]).remove();
              }
            }
          }
        });
      }

      function listenChat() {
        if (chatRef) chatRef.off();
        chatRef = db.ref(`rooms/${ROOM}/chat`);
        chatRef.limitToLast(10).on("value", snap => {
          const data = snap.val() || {};
          const box = document.getElementById("chatBox");
          const msgs = Object.values(data).sort((a, b) => a.timestamp - b.timestamp);
          box.innerHTML = msgs.map(m => {
            const d = new Date(m.timestamp);
            return `
<div style="border-bottom:1px solid #222;margin-bottom:6px;padding-bottom:6px;word-break: break-word;">
<div style="font-size:11px;color:#888">
${d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})} • <span style="color:#00ff88">${m.user}</span>
</div>
<div style="font-size:13px; margin-top:2px;">${m.text}</div>
</div>`;
          }).join("");
          box.scrollTop = box.scrollHeight;
        });
      }

      function listenRoom() {
        if (roomRef) roomRef.off();
        roomRef = db.ref(`rooms/${ROOM}/timers`);
        roomRef.on("value", snap => {
          timersData = snap.val() || {};
          renderAll();
        });
      }
      
      setInterval(renderAll, 1000);
      
      const list = document.getElementById("list");
      for (let i = 1; i <= 8; i++) {
        list.innerHTML += `
<div class="hud-card" id="card${i}">
<div><strong>CH${i}</strong></div>
<div class="center">
<button onclick="start(${i})">Start</button>
<button onclick="resetTimer(${i})">Reset</button>
</div>
<div class="right">
<span id="t${i}" style="font-family: monospace; font-size: 15px; font-weight: bold;">READY</span>
<div class="dot green" id="dot${i}"></div>
</div>
</div>`;
      }

      function renderAll() {
        for (let i = 1; i <= 8; i++) {
          const el = document.getElementById("t" + i);
          const card = document.getElementById("card" + i);
          const dot = document.getElementById("dot" + i);
          const data = timersData[i];
          if (!data) {
            el.innerText = "READY";
            dot.className = "dot green";
            card.classList.remove("orangeWarn");
            card.classList.remove("greenWarn");
            lastRemaining[i] = null;
            continue;
          }
          const elapsed = (Date.now() - data.startTime) / 1000;
          const remaining = data.duration - elapsed;
          if (remaining > 0) {
            const m = Math.floor(remaining / 60);
            const s = Math.floor(remaining % 60);
            el.innerText = `${m}:${String(s).padStart(2,"0")}`;
            dot.className = "dot " + (remaining < 60 ? "orange" : "red");
            card.classList.remove("greenWarn");
            if (remaining < 60) {
              card.classList.add("orangeWarn");
            } else {
              card.classList.remove("orangeWarn");
            }
          } else {
            const over = Math.abs(remaining);
            const m = Math.floor(over / 60);
            const s = Math.floor(over % 60);
            el.innerText = `+${m}:${String(s).padStart(2,"0")}`;
            dot.className = "dot green";
            card.classList.remove("orangeWarn");
            card.classList.add("greenWarn");
            if (lastRemaining[i] > 0) {
              speak("C H " + i + " ready");
              if (navigator.vibrate) {
                navigator.vibrate([300, 100, 300]);
              }
            }
          }
          lastRemaining[i] = remaining;
        }
      }

      function parseMinutes(v) {
        return Math.floor(parseFloat(v.replace(",", ".")) * 60);
      }

      function start(ch) {
        db.ref(`rooms/${ROOM}/timers/${ch}`).set({
          startTime: Date.now(),
          duration: parseMinutes(document.getElementById("minutesInput").value)
        });
      }

      function resetTimer(ch) {
        db.ref(`rooms/${ROOM}/timers/${ch}`).remove();
      }
      
      updateUI();
    </script>

  </body>

</html>
