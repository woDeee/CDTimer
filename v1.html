<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CD Timer HUD</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
    background:
    radial-gradient(circle at top,#121212,#070707);

    color:#eee;

    min-height:100vh;
}

.hud-wrap{
    max-width:700px;
    margin:auto;
}

.topbar{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:12px;

    flex-wrap:wrap;
}

.hud-card{

    background:
    rgba(255,255,255,.05);

    border:
    1px solid rgba(255,255,255,.08);

    border-radius:12px;

    backdrop-filter:blur(8px);

    transition:.2s;

    text-align:center;
}

.status{

    width:18px;

    height:18px;

    border-radius:4px;

    background:#00ff88;

    box-shadow:
    0 0 10px #00ff88;
}

.running{

    background:#ff4040 !important;

    box-shadow:
    0 0 12px #ff4040 !important;

    animation:
    pulse 1s infinite;
}

.finished{

    background:#00ff88 !important;
}

.timer{

    min-width:100px;

    font-weight:bold;

    font-variant-numeric:
    tabular-nums;
}

.btn-hud{

    background:#1f1f1f;

    color:#ddd;

    border:
    1px solid rgba(255,255,255,.12);
}

.btn-hud:hover{

    color:white;

    border-color:#00ff88;
}

textarea{

    background:#111 !important;

    color:white !important;

    border:
    1px solid rgba(255,255,255,.1) !important;
}

/* WARNING */

.warning{

    border:2px solid #ff9f1a !important;

    animation:
    warningPulse .8s infinite;

    box-shadow:
    0 0 20px rgba(255,160,0,.7);

}

@keyframes warningPulse{

0%{

border-color:#ff9f1a;

box-shadow:
0 0 8px rgba(255,160,0,.3);

}

50%{

border-color:#ff6600;

box-shadow:
0 0 28px rgba(255,120,0,.95);

}

100%{

border-color:#ff9f1a;

box-shadow:
0 0 8px rgba(255,160,0,.3);

}

}

@keyframes pulse{

0%{opacity:1}

50%{opacity:.4}

100%{opacity:1}

}

</style>
</head>

<body>

<div class="hud-wrap p-3">

<h3 class="text-center mb-4">
CD Timer HUD
</h3>

<div class="topbar mb-4">

<span>Minuten:</span>

<input
id="minutesInput"
class="form-control text-center"
style="width:120px"
value="19">

<div class="form-check d-flex align-items-center">

<input
class="form-check-input me-2"
type="checkbox"
id="muteVoice">

<label
class="form-check-label"
for="muteVoice">

Mute Voice

</label>

</div>

</div>

<div id="list"></div>

<div class="text-center mt-4">

<button
class="btn btn-danger"
onclick="resetAllTimers()">

ALLE TIMER RESETTEN

</button>

</div>

<div class="mt-4">

<textarea
id="shareData"
rows="4"
class="form-control mb-2"
placeholder="Export / Import String"></textarea>

<div class="d-flex justify-content-center gap-2 flex-wrap">

<button
class="btn btn-hud"
onclick="exportTimers()">

Export String

</button>

<button
class="btn btn-hud"
onclick="importTimers()">

Import String

</button>

</div>

</div>

</div>

<script>

const list =
document.getElementById(
"list"
);

const intervals = {};

for(let i=1;i<=8;i++){

list.innerHTML += `

<div
id="card${i}"
class="hud-card p-3 mb-2">

<div class="
d-flex
flex-wrap
justify-content-center
align-items-center
gap-2
w-100">

<strong style="width:60px">

CH${i}

</strong>

<button
class="btn btn-hud btn-sm"
onclick="start(${i})">

Start

</button>

<button
class="btn btn-hud btn-sm"
onclick="resetTimer(${i})">

Reset

</button>

<span
id="t${i}"
class="timer">

READY

</span>

<div
id="s${i}"
class="status finished">

</div>

</div>

</div>

`;

}

function parseMinutes(input){

const val =
parseFloat(
input.replace(",", ".")
);

if(isNaN(val)||val<=0)
return null;

const whole =
Math.floor(val);

const decimal =
val-whole;

return (
whole*60
)
+
Math.round(
decimal*60
);

}

function start(ch){

resetInterval(ch);

const duration =
parseMinutes(

document.getElementById(
"minutesInput"
).value

);

if(!duration)
return;

localStorage.setItem(

"timer_"+ch,

JSON.stringify({

startTime:
Date.now(),

duration:
duration

})

);

runTimer(ch);

}

function runTimer(ch,silent=false){

resetInterval(ch);

const saved =
JSON.parse(

localStorage.getItem(
"timer_"+ch
)

);

if(!saved)
return;

let announced =
silent;

const text =
document.getElementById(
"t"+ch
);

const status =
document.getElementById(
"s"+ch
);

const card =
document.getElementById(
"card"+ch
);

intervals[ch] =
setInterval(()=>{

const elapsed =
Math.floor(

(
Date.now()
-
saved.startTime
)

/
1000

);

const remaining =
saved.duration
-
elapsed;

if(remaining > 0){

text.innerText =
format(
remaining
);

status.classList.remove(
"finished"
);

status.classList.add(
"running"
);

if(
remaining <= 60
){

card.classList.add(
"warning"
);

}else{

card.classList.remove(
"warning"
);

}

}else{

text.innerText =
"+"
+
format(
Math.abs(
remaining
)
);

status.classList.remove(
"running"
);

status.classList.add(
"finished"
);

card.classList.remove(
"warning"
);

if(
!announced
){

speak(ch);

announced=true;

}

}

},1000);

}

function resetTimer(ch){

resetInterval(ch);

localStorage.removeItem(
"timer_"+ch
);

document.getElementById(
"t"+ch
).innerText =
"READY";

document.getElementById(
"card"+ch
).classList.remove(
"warning"
);

const s =
document.getElementById(
"s"+ch
);

s.classList.remove(
"running"
);

s.classList.add(
"finished"
);

}

function resetAllTimers(){

for(
let ch=1;
ch<=8;
ch++
){

resetTimer(ch);

}

}

function exportTimers(){

document.getElementById(
"shareData"
).value="";

const data={};

for(
let ch=1;
ch<=8;
ch++
){

const timer =
localStorage.getItem(
"timer_"+ch
);

if(timer){

data[ch]=
JSON.parse(
timer
);

}

}

const encoded =
btoa(
JSON.stringify(
data
)
);

document.getElementById(
"shareData"
).value =
encoded;

navigator.clipboard.writeText(
encoded
);

}

function importTimers(){

try{

const encoded =
document.getElementById(
"shareData"
)
.value
.trim();

if(!encoded)
return;

const decoded =
atob(
encoded
);

const data =
JSON.parse(
decoded
);

resetAllTimers();

for(
const ch in data
){

localStorage.setItem(

"timer_"+ch,

JSON.stringify(
data[ch]
)

);

runTimer(
Number(ch),
true
);

}

}catch{

alert(
"Ungültiger String"
);

}

}

function resetInterval(ch){

if(intervals[ch]){

clearInterval(
intervals[ch]
);

}

}

function format(sec){

const m =
Math.floor(
sec/60
);

const s =
sec % 60;

return `${m}:${String(s).padStart(2,"0")}`;

}

function speak(ch){

const muted =
document.getElementById(
"muteVoice"
).checked;

if(muted)
return;

const msg =
new SpeechSynthesisUtterance(

`C H ${ch} ready`

);

msg.lang =
"de-DE";

msg.rate =
0.9;

window
.speechSynthesis
.speak(
msg
);

}

window.onload = ()=>{

for(
let ch=1;
ch<=8;
ch++
){

if(

localStorage.getItem(
"timer_"+ch
)

){

runTimer(
ch,
true
);

}

}

};

</script>

</body>
</html>
