<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CD HUD Timer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: radial-gradient(circle at top,#121212,#070707);
    color:#eee;
    min-height:100vh;
}

.hud-wrap{
    max-width:700px;
    margin:auto;
}

.topbar{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.hud-card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    backdrop-filter: blur(8px);

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    transition:.2s;
}

.hud-card:hover{
    border-color:#00ffaa55;
}

.status{
    width:18px;
    height:18px;

    border-radius:4px;

    background:#00ff88;

    box-shadow:0 0 10px #00ff88;
}

.running{
    background:#ff4040 !important;

    box-shadow:0 0 12px #ff4040 !important;

    animation:pulse 1s infinite;
}

.finished{
    background:#00ff88 !important;
}

.timer{
    min-width:100px;

    font-weight:bold;

    font-variant-numeric: tabular-nums;
}

.btn-hud{
    background:#1f1f1f;

    color:#ddd;

    border:1px solid rgba(255,255,255,.12);
}

.btn-hud:hover{
    color:white;
    border-color:#00ff88;
}

.btn-reset-all{
    padding:10px 20px;
    font-weight:bold;
}

@keyframes pulse{

0%{opacity:1}
50%{opacity:.4}
100%{opacity:1}

}

</style>
</head>

<body>

<div class="hud-wrap p-3">

<h3 class="text-center mb-4">
CD Timer HUD
</h3>

<div class="topbar mb-4">

<span>Minuten:</span>

<input
id="minutesInput"
class="form-control text-center"
style="width:120px"
value="18">

</div>

<div id="list"></div>

<!-- GLOBAL RESET -->

<div class="text-center mt-4">

<button
class="btn btn-danger btn-reset-all"
onclick="resetAllTimers()">

ALLE TIMER RESETTEN

</button>

</div>

</div>

<script>

const list =
document.getElementById(
"list"
);

const intervals = {};

for(let i=1;i<=8;i++){

list.innerHTML += `

<div class="hud-card p-3 mb-2">

<div class="d-flex
flex-wrap
justify-content-center
align-items-center
gap-2
w-100">

<strong style="width:60px">
CH${i}
</strong>

<button
class="btn btn-hud btn-sm"
onclick="start(${i})">

Start

</button>

<button
class="btn btn-hud btn-sm"
onclick="resetTimer(${i})">

Reset

</button>

<span
id="t${i}"
class="timer">

READY

</span>

<div
id="s${i}"
class="status finished">

</div>

</div>

</div>

`;

}

function parseMinutes(input){

const val =
parseFloat(
input.replace(",", ".")
);

if(isNaN(val) || val <= 0)
return null;

const whole =
Math.floor(val);

const decimal =
val - whole;

const seconds =
Math.round(decimal * 60);

return (whole * 60) + seconds;

}

function start(ch){

resetInterval(ch);

const duration =
parseMinutes(
document.getElementById(
"minutesInput"
).value
);

if(!duration)
return;

localStorage.setItem(

"timer_"+ch,

JSON.stringify({

startTime:
Date.now(),

duration:
duration

})

);

runTimer(ch);

}

function runTimer(ch){

resetInterval(ch);

const saved =
JSON.parse(

localStorage.getItem(
"timer_"+ch
)

);

if(!saved)
return;

let announced =
false;

const text =
document.getElementById(
"t"+ch
);

const status =
document.getElementById(
"s"+ch
);

intervals[ch] =
setInterval(()=>{

const elapsed =
Math.floor(

(
Date.now()
-
saved.startTime
)

/1000

);

const remaining =
saved.duration
-
elapsed;

if(remaining > 0){

text.innerText =
format(
remaining
);

status.classList.remove(
"finished"
);

status.classList.add(
"running"
);

}else{

text.innerText =
"+"
+
format(
Math.abs(
remaining
)
);

status.classList.remove(
"running"
);

status.classList.add(
"finished"
);

if(!announced){

speak(ch);

announced = true;

}

}

},1000);

}

function resetTimer(ch){

resetInterval(ch);

localStorage.removeItem(
"timer_"+ch
);

document.getElementById(
"t"+ch
).innerText =
"READY";

const s =
document.getElementById(
"s"+ch
);

s.classList.remove(
"running"
);

s.classList.add(
"finished"
);

}

/* GLOBAL RESET */

function resetAllTimers(){

for(let ch=1; ch<=8; ch++){

resetTimer(ch);

}

}

function resetInterval(ch){

if(intervals[ch]){

clearInterval(
intervals[ch]
);

}

}

function format(sec){

const m =
Math.floor(sec/60);

const s =
sec % 60;

return `${m}:${
String(s)
.padStart(2,"0")
}`;

}

function speak(ch){

const msg =
new SpeechSynthesisUtterance(

`C H ${ch} ready`

);

msg.lang =
"de-DE";

msg.rate =
0.9;

window
.speechSynthesis
.speak(
msg
);

}

window.onload = ()=>{

for(let ch=1; ch<=8; ch++){

if(

localStorage.getItem(
"timer_"+ch
)

){

runTimer(ch);

}

}

};

</script>

</body>
</html>
